server:
  port: 8085

spring:
  application:
    name: bank-notifications
  kafka:
    consumer:
      bootstrap-servers: localhost:9092
      group-id: bank-app
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties.spring.json.trusted.packages: ru.yandex.practicum.notifications
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/bank-realm
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        service-name: notification-service
      config:
        enabled: true
        prefix: config
        defaultContext: application

management:
  endpoints:
    web:
      exposure:
        include: "*"
  zipkin:
    tracing:
      endpoint:  http://127.0.0.1:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1
  observations:
    key-values:
      rdbms:
        inline-parameters: true

logging:
  file:
    name: logs/bank.log
  level:
    root: INFO
  pattern:
    file: "%d{HH:mm:ss.SSS} %-5level: %msg%n"
    console: "%d{HH:mm:ss.SSS} %-5level: %msg%n"