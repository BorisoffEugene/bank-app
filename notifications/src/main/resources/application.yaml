server:
  port: 8085

spring:
  application:
    name: bank-notifications
  kafka:
    consumer:
      bootstrap-servers: kafka-broker-0.kafka-headless.default.svc.cluster.local:9092
      group-id: bank-app
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties.spring.json.trusted.packages: ru.yandex.practicum.notifications
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/bank-realm
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        service-name: notification-service
      config:
        enabled: true
        prefix: config
        defaultContext: application

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    root: INFO
    ru.yandex.practicum.notifications: DEBUG
    org.springframework.security: DEBUG
