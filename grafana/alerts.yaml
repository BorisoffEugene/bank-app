apiVersion: 1

groups:
  - orgId: 1
    name: 'AppAlertGroup'
    folder: 'Microservices'
    interval: 10s
    rules:
      - uid: 'http_5xx_errors_alert'
        title: 'High HTTP 5xx Error Rate'
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: 'Prometheus'
            model:
              expr: 'sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) * 60'
              intervalMs: 10000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: '-expr-'
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { params: [20], type: 'gt' }
                  operator: { type: 'and' }
                  query: { params: ['A'] }
                  reducer: { params: [], type: 'last' }
        for: 1m
        annotations:
          summary: "Высокое количество ошибок 5xx на бэкенде"
          description: "Зафиксировано более 20 ошибок 5xx в минуту. Проверьте логи приложений."
        labels:
          severity: 'critical'
      - uid: 'cash_failed_alert'
        title: 'High Failed Money Withdrawals'
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: 'Prometheus'
            model:
              expr: 'sum(rate(cash_failed_total[5m])) * 60'
              intervalMs: 10000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: '-expr-'
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { params: [ 15 ], type: 'gt' }
                  operator: { type: 'and' }
                  query: { params: [ 'A' ] }
                  reducer: { params: [ ], type: 'last' }
        for: 2m
        annotations:
          summary: "Рост отказов при снятии"
          description: "В системе фиксируется более 15 неудачных попыток снятия денег в минуту. Текущее значение: {{ $values.A.Value }}"
        labels:
          severity: 'warning'
      - uid: 'transfer_failed_alert'
        title: 'Critical Failed Money Transfers'
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: 'Prometheus'
            model:
              expr: 'sum(rate(transfer_failed_total[5m])) * 60'
              intervalMs: 10000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: '-expr-'
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { params: [ 30 ], type: 'gt' }
                  operator: { type: 'and' }
                  query: { params: [ 'A' ] }
                  reducer: { params: [ ], type: 'last' }
        for: 1m
        annotations:
          summary: "Массовый сбой денежных переводов"
          description: "Критическая ошибка: более 30 переводов денег завершились неудачей за последнюю минуту"
        labels:
          severity: 'critical'
