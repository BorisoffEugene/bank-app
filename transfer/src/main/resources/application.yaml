server:
  port: 8084

spring:
  application:
    name: bank-transfer
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/bank-realm
      client:
        registration:
          bank-transfer:
            provider: keycloak
            client-id: bank-transfer
            client-secret: ryLNTnYOL7qGJ2OYETBu8phZ8ghWZGSa
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/bank-realm
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        service-name: transfer-service
      config:
        enabled: true
        prefix: config
        defaultContext: application

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    root: INFO
    ru.yandex.practicum.transfer: DEBUG
    org.springframework.security: DEBUG
    org:
      hibernate:
        SQL: DEBUG