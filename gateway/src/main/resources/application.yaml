server:
  port: 8086

spring:
  application:
    name: bank-gateway
  main:
    web-application-type: reactive
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/bank-realm
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lowerCaseServiceId: true
      routes:
        - id: bank-accounts
          uri: lb://account-service
          predicates:
            - Path=/account/**
          filters:
            - name: JwtTokenRelay
        - id: bank-cash
          uri: lb://cash-service
          predicates:
            - Path=/cash/**
          filters:
            - name: JwtTokenRelay
        - id: bank-transfer
          uri: lb://transfer-service
          predicates:
            - Path=/transfer/**
          filters:
            - name: JwtTokenRelay
    consul:
      host: localhost
      port: 8500
      discovery:
        service-name: gateway-service
      config:
        enabled: true
        prefix: config
        defaultContext: application

management:
  endpoints:
    web:
      exposure:
        include: "*"
  zipkin:
    tracing:
      endpoint:  http://127.0.0.1:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1
  observations:
    key-values:
      rdbms:
        inline-parameters: true

logging:
  file:
    name: logs/bank.log
  level:
    root: INFO
  pattern:
    file: "%d{HH:mm:ss.SSS} %-5level: %msg%n"
    console: "%d{HH:mm:ss.SSS} %-5level: %msg%n"