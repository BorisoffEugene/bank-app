server:
  port: 8086

spring:
  application:
    name: bank-gateway
  main:
    web-application-type: reactive
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/bank-realm
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lowerCaseServiceId: true
      routes:
        - id: bank-accounts
          uri: lb://account-service
          predicates:
            - Path=/account/**
          filters:
            - name: JwtTokenRelay
        - id: bank-cash
          uri: lb://cash-service
          predicates:
            - Path=/cash/**
          filters:
            - name: JwtTokenRelay
        - id: bank-transfer
          uri: lb://transfer-service
          predicates:
            - Path=/transfer/**
          filters:
            - name: JwtTokenRelay
    consul:
      host: localhost
      port: 8500
      discovery:
        service-name: gateway-service
      config:
        enabled: true
        prefix: config
        defaultContext: application

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    root: INFO
    ru.yandex.practicum.gateway: DEBUG
    org.springframework.cloud.gateway: TRACE
    org.springframework.security: DEBUG
    reactor.netty.http.client: DEBUG
