services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: bank-keycloak
    command:
      - start-dev
      - --http-port=8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
    ports:
      - "8080:8080"
  consul:
    image: hashicorp/consul:1.15
    container_name: consul-server
    ports:
      - "8500:8500"
    command: "agent -server -bootstrap-expect=1 -ui -bind=0.0.0.0 -client=0.0.0.0"
  db:
    container_name: db
    image: postgres:17.5
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
  app-accounts:
    container_name: app-accounts
    build:
      context: .
      dockerfile: accounts/Dockerfile
    ports:
      - "8082:8082"
    image: app-accounts
    depends_on:
      - keycloak
      - db
      - consul
  app-cash:
    container_name: app-cash
    build:
      context: .
      dockerfile: cash/Dockerfile
    ports:
      - "8083:8083"
    image: app-cash
    depends_on:
      - keycloak
      - db
      - consul
  app-front:
    container_name: app-front
    build:
      context: .
      dockerfile: front/Dockerfile
    ports:
      - "8081:8081"
    image: app-front
    depends_on:
      - keycloak
      - db
      - consul
  app-gateway:
    container_name: app-gateway
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8086:8086"
    image: app-gateway
    depends_on:
      - keycloak
      - db
      - consul
  app-notifications:
    container_name: app-notifications
    build:
      context: .
      dockerfile: notifications/Dockerfile
    ports:
      - "8085:8085"
    image: app-notifications
    depends_on:
      - keycloak
      - db
      - consul
  app-transfer:
    container_name: app-transfer
    build:
      context: .
      dockerfile: transfer/Dockerfile
    ports:
      - "8084:8084"
    image: app-transfer
    depends_on:
      - keycloak
      - db
      - consul


