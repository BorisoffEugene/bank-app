server:
  port: 8083

spring:
  application:
    name: bank-cash
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    template:
      observation-enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/bank-realm
      client:
        registration:
          bank-cash:
            provider: keycloak
            client-id: bank-cash
            client-secret: FKnOEW584UqdFpwxNsLi4BmtsWWSUvMj
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/bank-realm
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        service-name: cash-service
      config:
        enabled: true
        prefix: config
        defaultContext: application

management:
  endpoints:
    web:
      exposure:
        include: "*"
  zipkin:
    tracing:
      endpoint:  http://127.0.0.1:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1
  observations:
    key-values:
      rdbms:
        inline-parameters: true

logging:
  level:
    root: INFO
    ru.yandex.practicum.cash: DEBUG
    org.springframework.security: DEBUG
    org:
      hibernate:
        SQL: DEBUG