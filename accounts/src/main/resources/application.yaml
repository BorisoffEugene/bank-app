server:
  port: 8082

spring:
  application:
    name: bank-accounts
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    template:
      observation-enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/bank-realm
      client:
        registration:
          bank-accounts:
            provider: keycloak
            client-id: bank-accounts
            client-secret: k3U67RgotCR59FbT7QzBsQY5Re61R4hX
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/bank-realm
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        service-name: account-service
      config:
        enabled: true
        prefix: config
        defaultContext: application

management:
  endpoints:
    web:
      exposure:
        include: "*"
  zipkin:
    tracing:
      endpoint:  http://127.0.0.1:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1
  observations:
    key-values:
      rdbms:
        inline-parameters: true

logging:
  file:
    name: logs/bank.log
  level:
    root: INFO
  pattern:
    file: "%d{HH:mm:ss.SSS} %-5level: %msg%n"
    console: "%d{HH:mm:ss.SSS} %-5level: %msg%n"