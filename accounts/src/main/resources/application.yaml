server:
  port: 8082

spring:
  application:
    name: bank-accounts
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/bank-realm
      client:
        registration:
          bank-accounts:
            provider: keycloak
            client-id: bank-accounts
            client-secret: bank-accounts-secret
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/bank-realm
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

bank:
  notifications:
    base-url: http://localhost:8085

logging:
  level:
    root: INFO
    org:
      hibernate:
        SQL: DEBUG